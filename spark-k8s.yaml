apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-speed-layer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-speed-layer
  template:
    metadata:
      labels:
        app: spark-speed-layer
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsUser: 0
      containers:
      - name: spark-container
        image: apache/spark-py:v3.4.0
        command: ["/bin/bash", "-c"]
        args:
          - |
            pip install --no-cache-dir boto3 redis && \
            /opt/spark/bin/spark-submit \
              --master "local[*]" \
              --conf "spark.jars.ivy=/tmp/.ivy2" \
              --packages "org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0" \
              /workspace/spark_streaming.py
        env:
          - name: HOME
            value: "/tmp"
          - name: SPARK_USER
            value: "root"
          - name: HADOOP_USER_NAME
            value: "root"
          - name: AWS_DEFAULT_REGION
            value: "us-east-1"
        volumeMounts:
        - mountPath: /workspace
          name: project-dir
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
      volumes:
      - name: project-dir
        hostPath:
          path: /home/ubuntu/kafka_2.13-3.5.1
